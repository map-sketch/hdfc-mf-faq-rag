name: Daily Data Refresh

on:
  schedule:
    # Runs at 10:30 AM IST (05:00 UTC) every day
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CHROMA_PERSIST_DIR: ./vectorstore
          COLLECTION_NAME: hdfc_mutual_fund_corpus
          BGE_MODEL_NAME: BAAI/bge-small-en-v1.5
          GROQ_MODEL_NAME: llama-3.3-70b-versatile
          RETRIEVAL_TOP_K: 5
          RETRIEVAL_SCORE_THRESHOLD: 0.2
        run: python -m src.ingest

      - name: Commit updated vectorstore
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vectorstore/
          git diff --staged --quiet || git commit -m "chore: auto-refresh vectorstore [$(date +'%Y-%m-%d')]"
          git push
